---
- name: Deploy API Backend
  hosts: localhost
  connection: local
  become: true
  gather_facts: false

  tasks:

    - name: Pull latest image
      command: docker pull bianca1232023/api-backend:latest

    - name: Stop old container
      command: docker rm -f api-backend
      ignore_errors: true

    - name: Start backend container
      command: >
        docker run -d
        --name api-backend
        --restart always
        -p 3000:3000
        -e DB_HOST=todolist-postgres.postgres.database.azure.com
        -e DB_PORT=5432
        -e DB_NAME=todolist
        -e DB_USER=postgresadmin
        -e DB_PASSWORD=123456
        bianca1232023/api-backend:latest

    - name: Pull latest frontend image
      command: docker pull bianca1232023/api-frontend:latest

    - name: Stop old frontend container
      command: docker rm -f api-frontend
      ignore_errors: true

    - name: Start frontend container
      command: >
        docker run -d
        --name api-frontend
        --restart always
        -p 80:80
        bianca1232023/api-frontend:latest