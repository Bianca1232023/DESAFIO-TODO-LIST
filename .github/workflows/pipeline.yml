name: DevOps Pipeline

on:
  push:
    branches:
      - main

jobs:
  ci-cd:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20



      - name: Install Backend Dependencies
        working-directory: infra/apis/backend
        run: npm install

      - name: Backend Tests
        working-directory: infra/apis/backend
        run: npm test



      - name: Install Frontend Dependencies
        working-directory: infra/apis/frontend
        run: npm install

      - name: Frontend Tests
        working-directory: infra/apis/frontend
        run: npm test