apiVersion: apps/v1
kind: StatefulSet

metadata:
  name: postgres-secondary
  namespace: devops-project

spec:
  serviceName: postgres-secondary

  replicas: 1

  selector:
    matchLabels:
      app: postgres-secondary

  template:
    metadata:
      labels:
        app: postgres-secondary

    spec:
      containers:
        - name: postgres
          image: postgres:16

          ports:
            - containerPort: 5432

          env:
            - name: POSTGRES_DB
              value: todolist

            - name: POSTGRES_USER
              value: postgres

            - name: POSTGRES_PASSWORD
              value: "123456"

          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"

            limits:
              cpu: "500m"
              memory: "512Mi"

          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data

  volumeClaimTemplates:
    - metadata:
        name: postgres-storage

      spec:
        storageClassName: standard

        accessModes:
          - ReadWriteOnce

        resources:
          requests:
            storage: 2Gi