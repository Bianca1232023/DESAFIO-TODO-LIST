name: DevOps Pipeline

on:
  push:
    branches:
      - main

env:
  BACKEND_IMAGE: bianca1232023/api-backend:latest
  FRONTEND_IMAGE: bianca1232023/api-frontend:latest
  GATEWAY_URL: http://${{ secrets.VM_HOST }}

jobs:

  tests:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      ###################################################
      # Backend
      ###################################################

      - name: Install Backend
        working-directory: infra/apis/backend
        run: npm install

      - name: Backend Tests
        working-directory: infra/apis/backend
        run: npm test

      ###################################################
      # Frontend
      ###################################################

      - name: Install Frontend
        working-directory: infra/apis/frontend
        run: npm install

      - name: Frontend Tests
        working-directory: infra/apis/frontend
        run: npm test

  sonarqube:

    name: SonarQube Quality Gate
    runs-on: ubuntu-latest
    needs: tests

    services:
      sonarqube:
        image: sonarqube:community
        ports:
          - 9000:9000
        env:
          SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: true

    steps:

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Wait for SonarQube
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:9000/api/system/status | grep -q UP; then
              echo "SonarQube UP"
              exit 0
            fi
            echo "Aguardando SonarQube..."
            sleep 10
          done
          exit 1

      - name: Bootstrap SonarQube token
        run: |
          TOKEN=$(curl -s -u admin:admin -X POST \
            "http://localhost:9000/api/user_tokens/generate?name=gha-${{ github.run_id }}" \
            | python3 -c "import sys,json; print(json.load(sys.stdin).get('token',''))")
          if [ -z "$TOKEN" ]; then
            echo "Falha ao gerar token SonarQube"
            exit 1
          fi
          echo "SONAR_TOKEN=$TOKEN" >> "$GITHUB_ENV"

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
          SONAR_HOST_URL: http://localhost:9000

      - name: Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
          SONAR_HOST_URL: http://localhost:9000

  security:

    runs-on: ubuntu-latest
    needs: tests

    steps:

      - uses: actions/checkout@v4

      - name: Trivy Scan Backend
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: infra/apis/backend

      - name: Trivy Scan Frontend
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: infra/apis/frontend

  build:

    runs-on: ubuntu-latest
    needs: [security, sonarqube]

    steps:

      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      ###################################################
      # Backend
      ###################################################

      - name: Build Backend
        run: |
          docker build \
            -t $BACKEND_IMAGE \
            infra/apis/backend

      - name: Push Backend
        run: docker push $BACKEND_IMAGE

      ###################################################
      # Frontend
      ###################################################

      - name: Build Frontend
        run: |
          docker build \
            -t $FRONTEND_IMAGE \
            infra/apis/frontend

      - name: Push Frontend
        run: docker push $FRONTEND_IMAGE

  deploy:

    runs-on: ubuntu-latest
    needs: build

    steps:

      - uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh

          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          ssh-keyscan -H ${{ secrets.VM_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy na VM
        run: |
          ssh \
            -i ~/.ssh/id_rsa \
            -o StrictHostKeyChecking=no \
            azureuser@${{ secrets.VM_HOST }} << 'EOF'

          set -e

          cd ~/DESAFIO-TODOLIST-VM

          echo "=== Docker Pull ==="
          docker pull bianca1232023/api-backend:latest
          docker pull bianca1232023/api-frontend:latest

          echo "=== Deploy Docker ==="
          cd infra/ansible
          ansible-playbook -i hosts.ini playbooks/deploy-docker.yml

          echo "=== Deploy Kubernetes ==="
          ansible-playbook -i hosts.ini playbooks/deploy-k8s.yml

          echo "=== Deploy Finalizado ==="

          EOF

  dast:

    name: DAST OWASP ZAP Baseline
    runs-on: ubuntu-latest
    needs: deploy

    permissions:
      contents: read

    steps:

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: ${{ env.GATEWAY_URL }}
          cmd_options: -a
          allow_issue_writing: false
          artifact_name: zap-scan-${{ github.run_id }}

  notify:

    runs-on: ubuntu-latest
    needs: [tests, sonarqube, security, build, deploy, dast]
    if: always()

    steps:

      - name: Notification
        run: |
          echo "Pipeline Finalizado"
          echo "tests=${{ needs.tests.result }}"
          echo "sonarqube=${{ needs.sonarqube.result }}"
          echo "security=${{ needs.security.result }}"
          echo "build=${{ needs.build.result }}"
          echo "deploy=${{ needs.deploy.result }}"
          echo "dast=${{ needs.dast.result }}"
          FAILED=0
          if [ "${{ needs.tests.result }}" = "failure" ]; then FAILED=1; fi
          if [ "${{ needs.sonarqube.result }}" = "failure" ]; then FAILED=1; fi
          if [ "${{ needs.security.result }}" = "failure" ]; then FAILED=1; fi
          if [ "${{ needs.build.result }}" = "failure" ]; then FAILED=1; fi
          if [ "${{ needs.deploy.result }}" = "failure" ]; then FAILED=1; fi
          if [ "${{ needs.dast.result }}" = "failure" ]; then FAILED=1; fi
          exit $FAILED